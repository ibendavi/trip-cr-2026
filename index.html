<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Private trip planner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
:root{--ink:#241a1a;--muted:#6b5b57;--line:#ece2dd;--bg:#faf6f2;--card:#fff;--red:#a4161a;--deep:#7a0f14;--gold:#b8860b;--green:#2f7d4f;--amber:#b45309}
*{box-sizing:border-box}
body{margin:0;font:16px/1.6 -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg)}
header{background:linear-gradient(135deg,#5c0a0e,#a4161a 55%,#c8963e);color:#fff;padding:30px 22px 26px}
header .wrap{max-width:1160px;margin:0 auto}
header h1{margin:0 0 6px;font-size:31px;letter-spacing:-.3px}
header p{margin:4px 0 0;color:#ffe9d6;font-size:15px;max-width:880px}
.banner{background:#fff7ed;border-bottom:1px solid #f3d9b5;color:#7a4b09;font-size:13.5px;padding:9px 22px}
.banner .wrap{max-width:1160px;margin:0 auto}
.wrap{max-width:1160px;margin:0 auto;padding:0 22px}
main{padding:22px 0 60px}
/* trip skeleton timeline */
.skel{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 6px}
.leg{flex:1;min-width:150px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 13px;border-top:4px solid var(--gold)}
.leg.work{border-top-color:var(--red)}
.leg.open{border-top-color:var(--green)}
.leg .d{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.leg b{display:block;font-size:15px;margin:2px 0 1px}
.leg span{font-size:12.5px;color:var(--muted)}
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin:20px 0 8px}
.tab{cursor:pointer;border:1px solid var(--line);background:var(--card);padding:10px 15px;border-radius:10px;font-weight:600;font-size:15px;color:var(--ink)}
.tab small{display:block;font-weight:400;color:var(--muted);font-size:12px}
.tab.active{background:var(--deep);color:#fff;border-color:var(--deep)}
.tab.active small{color:#f0cdb0}
.tab .rank{font-size:11px;color:var(--gold);font-weight:700}
.tab.active .rank{color:#ffd88a}
.hero{position:relative;border-radius:12px;overflow:hidden;margin:14px 0 4px;border:1px solid var(--line)}
.hero img{width:100%;height:300px;object-fit:cover;display:block;background:#5c0a0e}
.hero .cap{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.78));color:#fff;font-size:14px;padding:34px 16px 10px}
.hero .cap b{font-size:16px}
.hero .credit{display:block;font-size:11px;color:#e7d6c8;margin-top:2px}
.hero .credit a{color:#ffe0c4}
.cardrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:10px;margin:16px 0}
.stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.stat b{display:block;font-size:20px}
.stat span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.ok{color:var(--green)} .bad{color:var(--red)} .warn{color:var(--amber)}
.controls{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:8px 0 16px}
.controls h3{margin:0 0 6px;font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.variant-btns{display:flex;flex-wrap:wrap;gap:8px}
.vbtn{cursor:pointer;border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:9px 13px;font-size:14px;font-weight:600}
.vbtn small{display:block;font-weight:400;color:var(--muted);font-size:12px}
.vbtn.active{border-color:var(--red);background:#fdeeee;color:var(--red)}
.grid2{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}
@media(max-width:860px){.grid2{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.panel h3{margin:0;padding:11px 15px;font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--line);background:#faf5f1}
#map{height:430px}
.rate{padding:14px 16px}
.rbar{margin:10px 0}
.rbar .lab{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
.rbar .lab span:last-child{color:var(--muted);font-size:12px}
.track{height:9px;background:#f0e7e1;border-radius:6px;overflow:hidden}
.fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--gold),var(--red))}
.why{font-size:14.5px;padding:2px 16px 14px;color:var(--ink)}
.itin{margin:16px 0}
.itin .day{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:8px}
.itin .day b{color:var(--red)}
.itin .day .meta{float:right;color:var(--muted);font-size:13px}
.info{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
@media(max-width:860px){.info{grid-template-columns:1fr}}
.box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.box h4{margin:0 0 8px;font-size:15px}
.box.why2{border-left:4px solid var(--gold)}
.box.season{border-left:4px solid var(--amber)}
.box.stay{border-left:4px solid var(--green)}
.box.logi{border-left:4px solid var(--deep)}
.box ul{margin:6px 0;padding-left:18px}.box li{margin:3px 0;font-size:14.5px}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:11px;margin-left:6px}
.pill.green{background:#dcf5e6;color:#186a3b}.pill.red{background:#fde2e2;color:#991b1b}.pill.amber{background:#fef3c7;color:#92400e}
table.cmp{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:14px}
table.cmp th,table.cmp td{padding:9px 11px;border-bottom:1px solid var(--line);text-align:left}
table.cmp th{background:var(--deep);color:#fff;font-size:12.5px;text-transform:uppercase;letter-spacing:.4px}
table.cmp tr:hover td{background:#fdf6f1}
.routes{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin:8px 0}
.route{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 17px;border-top:5px solid var(--red)}
.route.b{border-top-color:var(--gold)}.route.c{border-top-color:var(--green)}
.route h3{margin:0 0 3px;font-size:17px}
.route .tag{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.route ol{margin:10px 0 8px;padding-left:20px}.route li{margin:4px 0;font-size:14px}
.route .foot{font-size:13px;color:var(--muted);border-top:1px dashed var(--line);padding-top:8px;margin-top:6px}
h2.sec{font-size:20px;margin:34px 0 6px}
.note{font-size:13px;color:var(--muted)}
footer{border-top:1px solid var(--line);color:var(--muted);font-size:13px;padding:20px 22px;text-align:center}
</style>
<style>
#gate{max-width:420px;margin:12vh auto;padding:28px 26px;background:var(--card);border:1px solid var(--line);border-radius:16px;text-align:center;box-shadow:0 8px 30px rgba(120,15,20,.08)}
#gate h1{font-size:22px;margin:0 0 4px;color:var(--deep)}
#gate p{color:var(--muted);font-size:14px;margin:0 0 18px}
#gate input{width:100%;padding:12px 14px;font-size:16px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:10px}
#gate input:focus{outline:none;border-color:var(--red)}
#gate button{width:100%;padding:12px;font-size:15px;font-weight:600;color:#fff;background:var(--red);border:0;border-radius:10px;cursor:pointer}
#gate button:hover{background:var(--deep)}
#gate .err{color:var(--red);font-size:13px;min-height:18px;margin-top:8px}
#gate .lock{font-size:34px;margin-bottom:6px}
</style>
</head>
<body>
<div id="gate">
  <div class="lock">🔒</div>
  <h1>Private trip</h1>
  <p>Enter the password to open the itinerary.</p>
  <input id="pw" type="password" placeholder="password" autocomplete="off" autofocus>
  <button id="go">Open</button>
  <div class="err" id="err"></div>
</div>
<div id="app"></div>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(pw){
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64(ENC.salt), iterations:ENC.iter, hash:'SHA-256'},
    baseKey, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(ENC.iv)}, key, b64(ENC.data));
  return new TextDecoder().decode(plain);
}
async function tryOpen(){
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  err.textContent = '';
  try{
    const htmlStr = await unlock(pw);
    try{ localStorage.setItem('cr_pw', pw); }catch(e){}
    document.getElementById('gate').remove();
    const app = document.getElementById('app');
    app.innerHTML = htmlStr;
    // re-execute injected inline scripts
    app.querySelectorAll('script').forEach(old=>{
      const s = document.createElement('script');
      s.textContent = old.textContent;
      old.replaceWith(s);
    });
  }catch(e){
    err.textContent = 'Wrong password — try again.';
  }
}
document.getElementById('go').onclick = tryOpen;
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') tryOpen(); });
// auto-open if previously unlocked on this device
(async()=>{ const saved=localStorage.getItem('cr_pw'); if(saved){ document.getElementById('pw').value=saved; try{ await tryOpen(); }catch(e){} } })();
